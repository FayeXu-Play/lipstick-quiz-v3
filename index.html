<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>Find Your Signature Lipstick Shade 💄</title>

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: linear-gradient(135deg,#ffdce2,#e4ecff);
  margin:0;
  padding:20px;
}

.container {
  max-width:500px;
  margin:auto;
}

h1 {
  text-align:center;
}

.card {
  background:#fff;
  padding:20px;
  border-radius:16px;
  margin-top:20px;
  box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

button {
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:#ff4d6d;
  color:#fff;
  cursor:pointer;
}

button:active {
  opacity:0.8;
}

img {
  width:100%;
  border-radius:12px;
  margin-bottom:15px;
}

.small {
  font-size:12px;
  color:#888;
}
</style>
</head>

<body>

<div class="container">
<h1>Find Your Signature Lipstick Shade 💄</h1>

<div id="quiz"></div>
<div id="result"></div>
</div>

<script>

// ===== 问题 =====
const questions = [
  {
    q:"Q1: In a cozy old bookstore near Mont Saint-Michel, what kind of texture draws you in?",
    o:[
      ["A","A. Dry, thick pages with that nostalgic ink scent"],
      ["B","B. Fresh paint — smooth, soft, and slightly glowing"]
    ]
  },
  {
    q:"Q2: What’s your perfect Paris afternoon?",
    o:[
      ["A","A. Watching an avant-garde exhibition at the Pompidou, quietly observing"],
      ["B","B. Sitting in a green chair at the Tuileries, soaking up the sun and watching pigeons glide by"],
      ["C","C. Wandering through vintage shops in Le Marais, hunting for a one-of-a-kind piece"]
    ]
  },
  {
    q:"Q3：For an upcoming presentation, what vibe do you want to give off?",
    o:[
      ["A","A. Sharp, structured, and completely on point"],
      ["B","B. Warm, natural, and easy to connect with"],
      ["C","C. Confident, radiant, and impossible to ignore"]
    ]
  }
];

// ===== 结果 =====
const map = {
"AAA":"937 Heartbeat Rose",
"AAB":"931 Bare Apricot",
"AAC":"937 Heartbeat Rose",
"ABA":"931 Bare Apricot",
"ABB":"931 Bare Apricot",
"ABC":"937 Heartbeat Rose",
"ACA":"937 Heartbeat Rose",
"ACB":"931 Bare Apricot",
"ACC":"937 Heartbeat Rose",
"BAA":"712 Fortune Koi",
"BAB":"721 Radiant Guava",
"BAC":"721 Radiant Guava",
"BBA":"703 Velvet Cinnamon",
"BBB":"703 Velvet Cinnamon",
"BBC":"721 Radiant Guava",
"BCA":"712 Fortune Koi",
"BCB":"703 Velvet Cinnamon",
"BCC":"712 Fortune Koi"
};

// ===== 描述 =====
const desc = {
"931 Bare Apricot":"Like a quiet café tucked away on the Left Bank, you carry a soft warmth that lingers. Understated yet thoughtful, your presence feels like a gentle conversation that stays with people long after it ends.",
"937 Heartbeat Rose":"Like a rose blooming in winter, you’re cool, composed, and quietly striking. There’s a distance to your elegance — the kind that makes people look twice, drawn in without quite knowing why.",
"703 Velvet Cinnamon":"Like sunlight spilling across a wooden floor, you embody effortless comfort. Nothing feels forced — your charm lives in the ease, the calm, the beauty of simply being.",
"721 Radiant Guava":"Like the golden hour in Paris, you glow with a natural spotlight. Vibrant and alive, you turn ordinary moments into scenes worth remembering.",
"712 Fortune Koi":"Like the first light of morning, you bring energy wherever you go. Bright, hopeful, and a little bit magical — being around you feels like good things are about to happen."
};

// ===== 图片 =====
const img = {
"703 Velvet Cinnamon":"img/703.jpg",
"712 Fortune Koi":"img/712.jpg",
"721 Radiant Guava":"img/721.jpg",
"931 Bare Apricot":"img/931.jpg",
"937 Heartbeat Rose":"img/937.jpg"
};

let i = 0;
let ans = "";

// ===== 渲染问题 =====
function render(){
  let d = questions[i];
  let h = `<div class="card"><p>${d.q}</p>`;

  d.o.forEach(x=>{
    h += `<button onclick="clickA('${x[0]}')">${x[1]}</button>`;
  });

  h += "</div>";
  document.getElementById("quiz").innerHTML = h;
}

// ===== 点击 =====
function clickA(k){
  if(i>=questions.length) return; // 防重复点击

  ans += k;
  i++;

  if(i < questions.length){
    render();
  } else {
    show();
  }
}

// ===== 结果 =====
function show(){
  let r = map[ans];

  if(!r){
    alert("出错了");
    location.reload();
    return;
  }

  document.getElementById("quiz").innerHTML = "";

  document.getElementById("result").innerHTML = `
    <div class="card">
      <img src="${img[r]}">
      <p class="small">Your shade</p>
      <h2>${r}</h2>
      <p>${desc[r]}</p>

      <p class="small">I got "${r}" 💄</p>

      <button onclick="location.reload()">Try again</button>
    </div>
  `;
}

// 启动
render();

</script>

</body>
</html>
