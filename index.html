<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>巴黎气质测试</title>

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont;
  background: linear-gradient(135deg, #ffdce2, #e4ecff);
  margin: 0;
  padding: 20px;
}

.container {
  max-width: 500px;
  margin: auto;
}

h1 {
  text-align: center;
}

.card {
  background: white;
  padding: 20px;
  border-radius: 20px;
  margin-top: 20px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border: none;
  border-radius: 12px;
  background: #ff4d6d;
  color: white;
  font-size: 14px;
}

.poster {
  background: linear-gradient(135deg, #ffccd5, #cdb4db);
  padding: 30px;
  border-radius: 20px;
  color: #333;
  text-align: center;
}

.poster h2 {
  font-size: 24px;
  margin-bottom: 10px;
}

.poster p {
  font-size: 14px;
  line-height: 1.6;
}

.tip {
  font-size: 12px;
  text-align: center;
  margin-top: 10px;
  color: #666;
}
</style>
</head>

<body>

<div class="container">
<h1>✨ 巴黎气质测试 ✨</h1>

<div id="quiz"></div>
<div id="result"></div>

</div>

<script>
const questions = [
  {
    text:"在圣米歇尔山的老书店翻阅旧书，你更迷恋哪种触感？",
    options:[
      {key:"A",text:"干燥厚实的旧书"},
      {key:"B",text:"湿润细腻的油画"}
    ]
  },
  {
    text:"如果在巴黎度过一个完美午后？",
    options:[
      {key:"A",text:"看先锋展"},
      {key:"B",text:"晒太阳"},
      {key:"C",text:"逛二手店"}
    ]
  },
  {
    text:"课堂汇报你想呈现？",
    options:[
      {key:"A",text:"专业严密"},
      {key:"B",text:"亲切自然"},
      {key:"C",text:"C位闪耀"}
    ]
  }
];

const resultsMap = {
"AAA":"937 悸动玫瑰",
"AAB":"931 无拘奶杏",
"AAC":"937 悸动玫瑰",
"ABA":"931 无拘奶杏",
"ABB":"931 无拘奶杏",
"ABC":"937 悸动玫瑰",
"ACA":"937 悸动玫瑰",
"ACB":"931 无拘奶杏",
"ACC":"937 悸动玫瑰",
"BAA":"712 幸运锦鲤",
"BAB":"721 千金芭乐",
"BAC":"721 千金芭乐",
"BBA":"703 柔情肉桂",
"BBB":"703 柔情肉桂",
"BBC":"721 千金芭乐",
"BCA":"712 幸运锦鲤",
"BCB":"703 柔情肉桂",
"BCC":"712 幸运锦鲤"
};

const descriptions = {
"931 无拘奶杏":"你是那种安静却有力量的人。",
"937 悸动玫瑰":"你带着距离感，却让人着迷。",
"703 柔情肉桂":"你天生拥有松弛的高级感。",
"721 千金芭乐":"你就是人群中的光。",
"712 幸运锦鲤":"你走到哪里都是好运。"
};

const images = {
  "703 柔情肉桂": "img/703.jpg",
  "712 幸运锦鲤": "img/712.jpg",
  "721 千金芭乐": "img/721.jpg",
  "931 无拘奶杏": "img/931.jpg",
  "937 悸动玫瑰": "img/937.jpg"
};
  
let current=0;
let answers="";

function render(){
  let q=questions[current];
  let html=`<div class="card"><p>${q.text}</p>`;
  q.options.forEach(o=>{
    html+=`<button onclick="choose('${o.key}')">${o.text}</button>`;
  });
  html+="</div>";
  document.getElementById("quiz").innerHTML=html;
}

function choose(k){
  answers+=k;
  current++;
  if(current<questions.length){
    render();
  }else{
    show();
  }
}

function show() {
  const resultText = resultsMap[answers];
  const desc = descriptions[resultText];
  const imgSrc = images[resultText];

  document.getElementById("quiz").style.display = "none";

  document.getElementById("result").innerHTML = `
    <div class="card result">

      <img src="${imgSrc}" 
           style="width:100%; border-radius:15px; margin-bottom:15px; box-shadow:0 8px 20px rgba(0,0,0,0.15);">

      <h2>${resultText}</h2>
      <p>${desc}</p>

      <p style="margin-top:15px; font-size:14px; color:#666;">
      I got "${resultText}" 💄 and it's way too accurate…
      </p>

      <p style="font-size:12px; color:#999;">
      📸 Screenshot & share your result
      </p>

      <button onclick="location.reload()">再测一次</button>

    </div>
  `;
}

render();
</script>

</body>
</html>
