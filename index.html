<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>Lipstick Test 💄</title>

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: linear-gradient(135deg,#ffdce2,#e4ecff);
  margin:0;
  padding:20px;
}

.container {
  max-width:500px;
  margin:auto;
}

h1 {
  text-align:center;
}

.card {
  background:#fff;
  padding:20px;
  border-radius:16px;
  margin-top:20px;
  box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

button {
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:#ff4d6d;
  color:#fff;
  cursor:pointer;
}

button:active {
  opacity:0.8;
}

img {
  width:100%;
  border-radius:12px;
  margin-bottom:15px;
}

.small {
  font-size:12px;
  color:#888;
}
</style>
</head>

<body>

<div class="container">
<h1>💄 Lipstick Personality Test</h1>

<div id="quiz"></div>
<div id="result"></div>
</div>

<script>

// ===== 问题 =====
const questions = [
  {
    q:"你更喜欢哪种触感？",
    o:[
      ["A","干燥旧书"],
      ["B","湿润油画"]
    ]
  },
  {
    q:"完美下午？",
    o:[
      ["A","看展"],
      ["B","晒太阳"],
      ["C","逛二手"]
    ]
  },
  {
    q:"汇报风格？",
    o:[
      ["A","专业"],
      ["B","亲和"],
      ["C","自信"]
    ]
  }
];

// ===== 结果 =====
const map = {
"AAA":"937 悸动玫瑰",
"AAB":"931 无拘奶杏",
"AAC":"937 悸动玫瑰",
"ABA":"931 无拘奶杏",
"ABB":"931 无拘奶杏",
"ABC":"937 悸动玫瑰",
"ACA":"937 悸动玫瑰",
"ACB":"931 无拘奶杏",
"ACC":"937 悸动玫瑰",
"BAA":"712 幸运锦鲤",
"BAB":"721 千金芭乐",
"BAC":"721 千金芭乐",
"BBA":"703 柔情肉桂",
"BBB":"703 柔情肉桂",
"BBC":"721 千金芭乐",
"BCA":"712 幸运锦鲤",
"BCB":"703 柔情肉桂",
"BCC":"712 幸运锦鲤"
};

// ===== 描述 =====
const desc = {
"931 无拘奶杏":"安静但有力量",
"937 悸动玫瑰":"冷静又迷人",
"703 柔情肉桂":"松弛又高级",
"721 千金芭乐":"人群焦点",
"712 幸运锦鲤":"自带好运"
};

// ===== 图片 =====
const img = {
"703 柔情肉桂":"img/703.jpg",
"712 幸运锦鲤":"img/712.jpg",
"721 千金芭乐":"img/721.jpg",
"931 无拘奶杏":"img/931.jpg",
"937 悸动玫瑰":"img/937.jpg"
};

let i = 0;
let ans = "";

// ===== 渲染问题 =====
function render(){
  let d = questions[i];
  let h = `<div class="card"><p>${d.q}</p>`;

  d.o.forEach(x=>{
    h += `<button onclick="clickA('${x[0]}')">${x[1]}</button>`;
  });

  h += "</div>";
  document.getElementById("quiz").innerHTML = h;
}

// ===== 点击 =====
function clickA(k){
  if(i>=questions.length) return; // 防重复点击

  ans += k;
  i++;

  if(i < questions.length){
    render();
  } else {
    show();
  }
}

// ===== 结果 =====
function show(){
  let r = map[ans];

  if(!r){
    alert("出错了");
    location.reload();
    return;
  }

  document.getElementById("quiz").innerHTML = "";

  document.getElementById("result").innerHTML = `
    <div class="card">
      <img src="${img[r]}">
      <p class="small">Your shade</p>
      <h2>${r}</h2>
      <p>${desc[r]}</p>

      <p class="small">I got "${r}" 💄</p>

      <button onclick="location.reload()">再测一次</button>
    </div>
  `;
}

// 启动
render();

</script>

</body>
</html>
