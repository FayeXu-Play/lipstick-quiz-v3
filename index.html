<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>Lipstick Personality Test 💄</title>

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: linear-gradient(135deg, #ffdce2, #e4ecff);
  margin: 0;
  padding: 20px;
}

.container {
  max-width: 500px;
  margin: auto;
}

h1 {
  text-align: center;
}

.card {
  background: white;
  padding: 20px;
  border-radius: 20px;
  margin-top: 20px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.1);
  animation: fadeIn 0.4s ease;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border: none;
  border-radius: 12px;
  background: #ff4d6d;
  color: white;
  font-size: 14px;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  transform: scale(1.03);
  background: #ff2e55;
}

.result img {
  width: 100%;
  border-radius: 15px;
  margin-bottom: 15px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.15);
}

.tip {
  font-size: 12px;
  color: #888;
  margin-top: 10px;
}

@keyframes fadeIn {
  from {opacity:0; transform:translateY(10px);}
  to {opacity:1;}
}
</style>
</head>

<body>

<div class="container">
  <h1>💄 Which Lipstick Shade Matches You?</h1>

  <div id="quiz"></div>
  <div id="result"></div>
</div>

<script>

const questions = [
  {
    text:"Q1: In a cozy old bookstore, what texture do you love?",
    options:[
      {key:"A",text:"Dry vintage paper"},
      {key:"B",text:"Soft fresh paint"}
    ]
  },
  {
    text:"Q2: Your perfect afternoon?",
    options:[
      {key:"A",text:"Art exhibition"},
      {key:"B",text:"Sun in the park"},
      {key:"C",text:"Vintage shopping"}
    ]
  },
  {
    text:"Q3: Your presentation vibe?",
    options:[
      {key:"A",text:"Sharp & professional"},
      {key:"B",text:"Warm & friendly"},
      {key:"C",text:"Confident & shining"}
    ]
  }
];

const resultsMap = {
"AAA":"937 悸动玫瑰",
"AAB":"931 无拘奶杏",
"AAC":"937 悸动玫瑰",
"ABA":"931 无拘奶杏",
"ABB":"931 无拘奶杏",
"ABC":"937 悸动玫瑰",
"ACA":"937 悸动玫瑰",
"ACB":"931 无拘奶杏",
"ACC":"937 悸动玫瑰",
"BAA":"712 幸运锦鲤",
"BAB":"721 千金芭乐",
"BAC":"721 千金芭乐",
"BBA":"703 柔情肉桂",
"BBB":"703 柔情肉桂",
"BBC":"721 千金芭乐",
"BCA":"712 幸运锦鲤",
"BCB":"703 柔情肉桂",
"BCC":"712 幸运锦鲤"
};

const descriptions = {
"931 无拘奶杏":"Quiet, gentle, but powerful.",
"937 悸动玫瑰":"Cold, elegant, a little dangerous.",
"703 柔情肉桂":"Effortlessly chic and relaxed.",
"721 千金芭乐":"You are the main character.",
"712 幸运锦鲤":"You bring luck everywhere."
};

const images = {
  "703 柔情肉桂": "img/703.jpg",
  "712 幸运锦鲤": "img/712.jpg",
  "721 千金芭乐": "img/721.jpg",
  "931 无拘奶杏": "img/931.jpg",
  "937 悸动玫瑰": "img/937.jpg"
};

let current = 0;
let answers = "";
let locked = false;

function render(){
  const q = questions[current];

  let html = `<div class="card"><p>${q.text}</p>`;

  q.options.forEach(o=>{
    html += `<button onclick="choose('${o.key}')">${o.text}</button>`;
  });

  html += "</div>";

  document.getElementById("quiz").innerHTML = html;
}

function choose(k){
  if(locked) return;
  locked = true;

  answers += k;
  current++;

  setTimeout(()=>{
    locked = false;

    if(current < questions.length){
      render();
    } else {
      show();
    }
  }, 200);
}

function show(){
  const resultText = resultsMap[answers];

  if(!resultText){
    alert("Something went wrong, try again!");
    location.reload();
    return;
  }

  const desc = descriptions[resultText];
  const imgSrc = images[resultText];

  document.getElementById("quiz").style.display = "none";

  document.getElementById("result").innerHTML = `
    <div class="card result">
      
      <img src="${imgSrc}">

      <p class="tip">Your Shade</p>
      <h2>${resultText}</h2>

      <p>${desc}</p>

      <p style="margin-top:15px;">
      I got "${resultText}" 💄 and it's so accurate…
      </p>

      <p class="tip">📸 Screenshot & share</p>

      <button onclick="location.reload()">Try Again</button>

    </div>
  `;
}

render();

</script>

</body>
</html>
