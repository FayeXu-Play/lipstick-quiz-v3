<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>Find Your Signature Lipstick Shade 💄</title>

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: linear-gradient(135deg,#ffdce2,#e4ecff);
  margin:0;
  padding:20px;
}

.container {
  max-width:500px;
  margin:auto;
}

h1 {
  text-align:center;
}

/* ⭐ 进度条 */
.progress-wrap {
  margin-top:15px;
}

.progress-text {
  font-size:12px;
  color:#666;
  margin-bottom:6px;
}

.progress-bar {
  width:100%;
  height:6px;
  background:#eee;
  border-radius:10px;
  overflow:hidden;
}

.progress-inner {
  height:100%;
  width:0%;
  background:#ff4d6d;
  transition:0.3s;
}

/* 卡片 */
.card {
  background:#fff;
  padding:20px;
  border-radius:16px;
  margin-top:20px;
  box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

/* 图片网格 */
.option-grid {
  display: grid;
  gap: 12px;
  margin-top: 15px;
}

.option {
  border-radius:12px;
  overflow:hidden;
  cursor:pointer;
  background:#fff;
  box-shadow:0 6px 15px rgba(0,0,0,0.08);
  transition:0.2s;
}

.option:hover {
  transform:scale(1.02);
}

/* ⭐ 改成完整显示图片 */
.option img {
  width:100%;
  aspect-ratio:1/1;
  object-fit:contain;
  background:#f7f7f7;
  display:block;
}

.option-text {
  padding:10px;
  font-size:13px;
}

.btn {
  width:100%;
  padding:12px;
  margin-top:15px;
  border:none;
  border-radius:10px;
  background:#ff4d6d;
  color:#fff;
  cursor:pointer;
}

.small {
  font-size:12px;
  color:#888;
}
</style>
</head>

<body>

<div class="container">
<h1>Find Your Signature Lipstick Shade 💄</h1>

<!-- ⭐ 进度条 -->
<div class="progress-wrap">
  <div class="progress-text" id="progressText">Question 1 / 3</div>
  <div class="progress-bar">
    <div class="progress-inner" id="progressBar"></div>
  </div>
</div>

<div id="quiz"></div>
<div id="result"></div>
</div>

<script>

const questions = [
  {
    q:"Q1: In a cozy old bookstore near Mont Saint-Michel, what kind of texture draws you in?",
    o:[
      ["A","A. Dry, thick pages with that nostalgic ink scent","img/book.jpg"],
      ["B","B. Fresh paint — smooth, soft, and slightly glowing","img/paint.jpg"]
    ]
  },
  {
    q:"Q2: What’s your perfect Paris afternoon?",
    o:[
      ["A","A. Watching an avant-garde exhibition at the Pompidou, quietly observing","img/exhibition.jpg"],
      ["B","B. Sitting in a green chair at the Tuileries, soaking up the sun and watching pigeons glide by","img/park.jpg"],
      ["C","C. Wandering through vintage shops in Le Marais, hunting for a one-of-a-kind piece","img/vintage.jpg"]
    ]
  },
  {
    q:"Q3: For an upcoming presentation, what vibe do you want to give off?",
    o:[
      ["A","A. Sharp and professional","img/pre.jpg"],
      ["B","B. Warm and friendly","img/soft.jpg"],
      ["C","C. Confident and radiant","img/shine.jpg"]
    ]
  }
];

const map = {
"AAA":"937 Heartbeat Rose",
"AAB":"931 Bare Apricot",
"AAC":"937 Heartbeat Rose",
"ABA":"931 Bare Apricot",
"ABB":"931 Bare Apricot",
"ABC":"937 Heartbeat Rose",
"ACA":"937 Heartbeat Rose",
"ACB":"931 Bare Apricot",
"ACC":"937 Heartbeat Rose",
"BAA":"712 Fortune Koi",
"BAB":"721 Radiant Guava",
"BAC":"721 Radiant Guava",
"BBA":"703 Velvet Cinnamon",
"BBB":"703 Velvet Cinnamon",
"BBC":"721 Radiant Guava",
"BCA":"712 Fortune Koi",
"BCB":"703 Velvet Cinnamon",
"BCC":"712 Fortune Koi"
};

const desc = {
"931 Bare Apricot":"Like a quiet café tucked away on the Left Bank, you carry a soft warmth.",
"937 Heartbeat Rose":"Like a rose blooming in winter, cool and quietly striking.",
"703 Velvet Cinnamon":"Like sunlight on wood, effortless and calm.",
"721 Radiant Guava":"Like golden hour, glowing and vibrant.",
"712 Fortune Koi":"Like morning light, full of energy and luck."
};

const img = {
"703 Velvet Cinnamon":"img/703.jpg",
"712 Fortune Koi":"img/712.jpg",
"721 Radiant Guava":"img/721.jpg",
"931 Bare Apricot":"img/931.jpg",
"937 Heartbeat Rose":"img/937.jpg"
};

let i = 0;
let ans = "";

/* ⭐ 更新进度条 */
function updateProgress(){
  let percent = ((i)/questions.length)*100;
  document.getElementById("progressBar").style.width = percent + "%";
  document.getElementById("progressText").innerText = `Question ${i+1} / ${questions.length}`;
}

/* 渲染 */
function render(){
  updateProgress();

  let d = questions[i];

  let h = `<div class="card"><p>${d.q}</p><div class="option-grid">`;

  d.o.forEach(x=>{
    h += `
      <div class="option" onclick="clickA('${x[0]}')">
        <img src="${x[2]}">
        <div class="option-text">${x[1]}</div>
      </div>
    `;
  });

  h += "</div></div>";

  document.getElementById("quiz").innerHTML = h;
}

/* 点击 */
function clickA(k){
  if(i>=questions.length) return;

  ans += k;
  i++;

  if(i < questions.length){
    render();
  } else {
    show();
  }
}

/* 结果 */
function show(){
  let r = map[ans];

  document.querySelector(".progress-wrap").style.display = "none";

  document.getElementById("quiz").innerHTML = "";

  document.getElementById("result").innerHTML = `
    <div class="card">
      <img src="${img[r]}">
      <p class="small">Your shade</p>
      <h2>${r}</h2>
      <p>${desc[r]}</p>

      <p class="small">I got "${r}" 💄</p>

      <button class="btn" onclick="location.reload()">Try again</button>
    </div>
  `;
}

render();

</script>

</body>
</html>
