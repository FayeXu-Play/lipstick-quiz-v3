<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>Find Your Signature Lipstick Shade 💄</title>

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: linear-gradient(135deg,#ffdce2,#e4ecff);
  margin:0;
  padding:20px;
}

.container {
  max-width:500px;
  margin:auto;
}

h1 {
  text-align:center;
}

.card {
  background:#fff;
  padding:20px;
  border-radius:16px;
  margin-top:20px;
  box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

/* ⭐ 图片网格（关键） */
.option-grid {
  display: grid;
  gap: 12px;
  margin-top: 15px;
}

.option {
  border-radius:12px;
  overflow:hidden;
  cursor:pointer;
  border:none;
  padding:0;
  background:#fff;
  box-shadow:0 6px 15px rgba(0,0,0,0.08);
  transition:0.2s;
}

.option:hover {
  transform:scale(1.02);
}

/* ⭐ 图片统一大小 */
.option img {
  width:100%;
  height:140px;
  object-fit:cover;
  display:block;
}

.option-text {
  padding:10px;
  font-size:13px;
}

/* 按钮 */
.btn {
  width:100%;
  padding:12px;
  margin-top:15px;
  border:none;
  border-radius:10px;
  background:#ff4d6d;
  color:#fff;
  cursor:pointer;
}

.small {
  font-size:12px;
  color:#888;
}
</style>
</head>

<body>

<div class="container">
<h1>Find Your Signature Lipstick Shade 💄</h1>

<div id="quiz"></div>
<div id="result"></div>
</div>

<script>

// ===== 问题（带图片）=====
const questions = [
  {
    q:"Q1: In a cozy old bookstore near Mont Saint-Michel, what kind of texture draws you in?",
    o:[
      ["A","Dry, thick pages with that nostalgic ink scent","img/book.jpg"],
      ["B","Fresh paint — smooth, soft, and slightly glowing","img/paint.jpg"]
    ]
  },
  {
    q:"Q2: What’s your perfect Paris afternoon?",
    o:[
      ["A","Watching an avant-garde exhibition","img/exhibition.jpg"],
      ["B","Sitting in the Tuileries garden","img/park.jpg"],
      ["C","Vintage shopping in Le Marais","img/vintage.jpg"]
    ]
  },
  {
    q:"Q3: For an upcoming presentation, what vibe do you want to give off?",
    o:[
      ["A","Sharp and professional","img/pre.jpg"],
      ["B","Warm and friendly","img/soft.jpg"],
      ["C","Confident and radiant","img/shine.jpg"]
    ]
  }
];

// ===== 结果 =====
const map = {
"AAA":"937 Heartbeat Rose",
"AAB":"931 Bare Apricot",
"AAC":"937 Heartbeat Rose",
"ABA":"931 Bare Apricot",
"ABB":"931 Bare Apricot",
"ABC":"937 Heartbeat Rose",
"ACA":"937 Heartbeat Rose",
"ACB":"931 Bare Apricot",
"ACC":"937 Heartbeat Rose",
"BAA":"712 Fortune Koi",
"BAB":"721 Radiant Guava",
"BAC":"721 Radiant Guava",
"BBA":"703 Velvet Cinnamon",
"BBB":"703 Velvet Cinnamon",
"BBC":"721 Radiant Guava",
"BCA":"712 Fortune Koi",
"BCB":"703 Velvet Cinnamon",
"BCC":"712 Fortune Koi"
};

// ===== 描述 =====
const desc = {
"931 Bare Apricot":"Like a quiet café tucked away on the Left Bank, you carry a soft warmth that lingers.",
"937 Heartbeat Rose":"Like a rose blooming in winter, you’re cool, composed, and quietly striking.",
"703 Velvet Cinnamon":"Like sunlight spilling across a wooden floor, you embody effortless comfort.",
"721 Radiant Guava":"Like the golden hour in Paris, you glow with a natural spotlight.",
"712 Fortune Koi":"Like the first light of morning, you bring energy wherever you go."
};

// ===== 结果图片 =====
const img = {
"703 Velvet Cinnamon":"img/703.jpg",
"712 Fortune Koi":"img/712.jpg",
"721 Radiant Guava":"img/721.jpg",
"931 Bare Apricot":"img/931.jpg",
"937 Heartbeat Rose":"img/937.jpg"
};

let i = 0;
let ans = "";

// ===== 渲染问题 =====
function render(){
  let d = questions[i];

  let h = `<div class="card"><p>${d.q}</p><div class="option-grid">`;

  d.o.forEach(x=>{
    h += `
      <div class="option" onclick="clickA('${x[0]}')">
        <img src="${x[2]}">
        <div class="option-text">${x[1]}</div>
      </div>
    `;
  });

  h += "</div></div>";

  document.getElementById("quiz").innerHTML = h;
}

// ===== 点击 =====
function clickA(k){
  if(i>=questions.length) return;

  ans += k;
  i++;

  if(i < questions.length){
    render();
  } else {
    show();
  }
}

// ===== 结果 =====
function show(){
  let r = map[ans];

  if(!r){
    alert("Error");
    location.reload();
    return;
  }

  document.getElementById("quiz").innerHTML = "";

  document.getElementById("result").innerHTML = `
    <div class="card">
      <img src="${img[r]}">
      <p class="small">Your shade</p>
      <h2>${r}</h2>
      <p>${desc[r]}</p>

      <p class="small">I got "${r}" 💄</p>

      <button class="btn" onclick="location.reload()">Try again</button>
    </div>
  `;
}

// 启动
render();

</script>

</body>
</html>
