<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>巴黎气质测试</title>

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: linear-gradient(135deg, #ffe6eb, #e6f0ff);
  margin: 0;
  padding: 20px;
}

.container {
  max-width: 500px;
  margin: auto;
}

h1 {
  text-align: center;
  color: #333;
}

.card {
  background: white;
  padding: 20px;
  border-radius: 20px;
  margin-top: 20px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.1);
  animation: fadeIn 0.5s ease;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border: none;
  border-radius: 12px;
  background: #ff6b81;
  color: white;
  font-size: 14px;
  cursor: pointer;
  transition: all 0.2s;
}

button:hover {
  transform: scale(1.03);
  background: #ff4d6d;
}

.progress {
  height: 6px;
  background: #eee;
  border-radius: 10px;
  overflow: hidden;
  margin-top: 20px;
}

.progress-bar {
  height: 100%;
  width: 33%;
  background: #ff6b81;
  transition: width 0.3s;
}

.result {
  text-align: center;
  padding: 20px;
}

.result h2 {
  color: #ff4d6d;
}

@keyframes fadeIn {
  from {opacity: 0; transform: translateY(10px);}
  to {opacity: 1;}
}
</style>
</head>

<body>

<div class="container">
  <h1>✨ 巴黎气质测试 ✨</h1>

  <div class="progress">
    <div class="progress-bar" id="progress"></div>
  </div>

  <div id="quiz"></div>
  <div id="result"></div>
</div>

<script>
const questions = [
  {
    text: "在圣米歇尔山的老书店翻阅旧书，你更迷恋哪种触感？",
    options: [
      {key:"A", text:"干燥、厚实、带着墨香味的磨砂纸张"},
      {key:"B", text:"细腻、湿润、闪着微光的油画质感"}
    ]
  },
  {
    text: "如果让你在巴黎度过一个完美的午后，你会如何安排？",
    options: [
      {key:"A", text:"蓬皮杜中心看先锋展"},
      {key:"B", text:"杜乐丽花园晒太阳"},
      {key:"C", text:"玛黑区淘二手店"}
    ]
  },
  {
    text: "面对课堂汇报，你希望自己展现出？",
    options: [
      {key:"A", text:"专业严密"},
      {key:"B", text:"亲切自然"},
      {key:"C", text:"自信C位"}
    ]
  }
];

const resultsMap = {
  "AAA":"937 悸动玫瑰",
  "AAB":"931 无拘奶杏",
  "AAC":"937 悸动玫瑰",
  "ABA":"931 无拘奶杏",
  "ABB":"931 无拘奶杏",
  "ABC":"937 悸动玫瑰",
  "ACA":"937 悸动玫瑰",
  "ACB":"931 无拘奶杏",
  "ACC":"937 悸动玫瑰",
  "BAA":"712 幸运锦鲤",
  "BAB":"721 千金芭乐",
  "BAC":"721 千金芭乐",
  "BBA":"703 柔情肉桂",
  "BBB":"703 柔情肉桂",
  "BBC":"721 千金芭乐",
  "BCA":"712 幸运锦鲤",
  "BCB":"703 柔情肉桂",
  "BCC":"712 幸运锦鲤"
};

const descriptions = {
  "931 无拘奶杏": "知性哲学家｜理性又温柔，像左岸咖啡馆的思考者。",
  "937 悸动玫瑰": "清冷艺术家｜独立沉稳，自带高级感。",
  "703 柔情肉桂": "松弛感天才｜不费力的时髦，自在舒适。",
  "721 千金芭乐": "明媚女主角｜闪耀社交中心。",
  "712 幸运锦鲤": "能量派锦鲤｜元气满满的小太阳。"
};

let current = 0;
let answers = "";

function renderQuestion() {
  const q = questions[current];
  const quiz = document.getElementById("quiz");

  let html = `<div class="card"><p>${q.text}</p>`;

  q.options.forEach(opt => {
    html += `<button onclick="select('${opt.key}')">${opt.text}</button>`;
  });

  html += "</div>";
  quiz.innerHTML = html;

  document.getElementById("progress").style.width = ((current+1)/3*100)+"%";
}

function select(key) {
  answers += key;
  current++;

  if (current < questions.length) {
    renderQuestion();
  } else {
    showResult();
  }
}

function showResult() {
  const resultText = resultsMap[answers];
  const desc = descriptions[resultText];

  document.getElementById("quiz").style.display = "none";

  document.getElementById("result").innerHTML = `
    <div class="card result">
      <h2>${resultText}</h2>
      <p>${desc}</p>
      <p>你的选择：${answers}</p>
      <button onclick="location.reload()">再测一次</button>
    </div>
  `;
}

renderQuestion();
</script>

</body>
</html>
